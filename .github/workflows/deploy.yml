name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - working-directory: frontend
        run: npm install
      
      - working-directory: frontend
        run: npm run build
      
      - uses: actions/upload-pages-artifact@v2
        with:
          path: frontend/dist
      
      - uses: actions/deploy-pages@v2


