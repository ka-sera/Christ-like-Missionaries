name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: cd frontend && npm install && npm run build
      - uses: actions/upload-pages-artifact@v2
        with:
          path: frontend/dist
      - uses: actions/deploy-pages@v2



